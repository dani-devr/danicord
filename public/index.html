<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danicord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Estilos baseados nas cores exatas do Discord */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Custom Scrollbar estilo Discord */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #2B2D31; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #1A1B1E; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #111214; }

        .discord-input-placeholder::placeholder { color: #87898C; }
        
        /* Modal de Carregamento/Aviso */
        #custom-alert { display: none; }
    </style>
</head>
<body class="bg-[#313338] text-[#DBDEE1] h-screen w-screen overflow-hidden flex selection:bg-[#5865F2] selection:text-white">

    <!-- Modal de Login/Registro -->
    <div id="login-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-[#313338] p-8 rounded-lg shadow-2xl w-full max-w-md transform transition-all">
            <h2 class="text-2xl font-bold text-center text-white mb-2">Bem-vindo ao Danicord!</h2>
            <p class="text-center text-[#B5BAC1] text-sm mb-6">Estamos muito felizes em ter você aqui.</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-[#B5BAC1] uppercase mb-1">E-mail <span class="text-red-500">*</span></label>
                    <input type="email" id="email" required class="w-full bg-[#1E1F22] text-white rounded p-2.5 focus:outline-none focus:ring-1 focus:ring-[#5865F2] transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#B5BAC1] uppercase mb-1">Nome de Exibição <span class="text-red-500">*</span></label>
                    <input type="text" id="username" required class="w-full bg-[#1E1F22] text-white rounded p-2.5 focus:outline-none focus:ring-1 focus:ring-[#5865F2] transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#B5BAC1] uppercase mb-1">Senha <span class="text-red-500">*</span></label>
                    <input type="password" id="password" required class="w-full bg-[#1E1F22] text-white rounded p-2.5 focus:outline-none focus:ring-1 focus:ring-[#5865F2] transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#B5BAC1] uppercase mb-1">URL da Imagem de Perfil (Opcional)</label>
                    <input type="url" id="avatar" placeholder="https://..." class="w-full bg-[#1E1F22] text-white rounded p-2.5 focus:outline-none focus:ring-1 focus:ring-[#5865F2] transition">
                </div>
                
                <button type="submit" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-semibold py-2.5 rounded transition mt-4">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- Interface Principal do Aplicativo -->
    <div id="app-container" class="hidden h-full w-full flex">
        
        <!-- Barra de Servidores (Esquerda fina) -->
        <nav class="w-[72px] bg-[#1E1F22] h-full flex flex-col items-center py-3 gap-2 flex-shrink-0">
            <div class="w-12 h-12 bg-[#5865F2] text-white rounded-[16px] flex items-center justify-center cursor-pointer shadow-lg transition-all hover:rounded-xl">
                <i class="fa-solid fa-gamepad text-2xl"></i>
            </div>
            <div class="w-8 h-[2px] bg-[#313338] rounded-full my-1"></div>
            <!-- Botão de adicionar servidor (decorativo) -->
            <div class="w-12 h-12 bg-[#313338] text-[#23A559] hover:bg-[#23A559] hover:text-white rounded-[24px] hover:rounded-xl flex items-center justify-center cursor-pointer transition-all">
                <i class="fa-solid fa-plus text-xl"></i>
            </div>
        </nav>

        <!-- Barra de Canais -->
        <aside class="w-60 bg-[#2B2D31] flex flex-col flex-shrink-0 rounded-tl-lg overflow-hidden">
            <header class="h-12 border-b border-[#1E1F22] flex items-center px-4 font-bold text-white shadow-sm cursor-pointer hover:bg-[#35373C] transition">
                Danicord Server
                <i class="fa-solid fa-chevron-down ml-auto text-sm opacity-80"></i>
            </header>
            
            <div class="flex-1 overflow-y-auto p-2">
                <div class="text-[#87898C] text-xs font-bold uppercase hover:text-[#DBDEE1] cursor-pointer flex items-center mb-1">
                    <i class="fa-solid fa-chevron-down text-[10px] mr-1"></i> Canais de Texto
                </div>
                <!-- Canal Ativo -->
                <div class="bg-[#404249] text-white rounded px-2 py-1.5 flex items-center gap-2 cursor-pointer mb-0.5">
                    <i class="fa-solid fa-hashtag text-[#87898C] text-lg"></i>
                    <span>geral</span>
                </div>
            </div>

            <!-- Painel do Usuário (Rodapé) -->
            <div class="h-[52px] bg-[#232428] flex items-center px-2 gap-2">
                <div class="relative cursor-pointer hover:bg-[#3F4147] p-1 rounded flex-1 flex items-center gap-2">
                    <img id="my-avatar-display" src="https://cdn.discordapp.com/embed/avatars/0.png" class="w-8 h-8 rounded-full object-cover">
                    <div class="flex flex-col">
                        <span id="my-name-display" class="text-sm font-semibold text-white leading-tight">Usuário</span>
                        <span class="text-xs text-[#B5BAC1] leading-tight">Online</span>
                    </div>
                </div>
                <div class="flex text-[#B5BAC1]">
                    <button class="hover:bg-[#3F4147] p-1.5 rounded transition"><i class="fa-solid fa-microphone"></i></button>
                    <button class="hover:bg-[#3F4147] p-1.5 rounded transition"><i class="fa-solid fa-headphones"></i></button>
                    <button class="hover:bg-[#3F4147] p-1.5 rounded transition"><i class="fa-solid fa-gear"></i></button>
                </div>
            </div>
        </aside>

        <!-- Área de Chat Principal -->
        <main class="flex-1 flex flex-col bg-[#313338] relative min-w-0">
            <!-- Cabeçalho do Chat -->
            <header class="h-12 border-b border-[#1E1F22] flex items-center px-4 font-semibold text-white shadow-sm gap-2">
                <i class="fa-solid fa-hashtag text-[#87898C] text-xl"></i>
                <span class="mr-2">geral</span>
                <div class="w-[1px] h-6 bg-[#4E5058] mx-2"></div>
                <span class="text-[#B5BAC1] text-sm font-normal">Chat geral onde todo mundo pode conversar.</span>
            </header>

            <!-- Mensagens -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Mensagem de Boas vindas inicial -->
                <div class="mt-8 mb-4">
                    <div class="w-16 h-16 bg-[#5865F2] rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-hashtag text-white text-3xl"></i>
                    </div>
                    <h1 class="text-white text-3xl font-bold mb-2">Bem-vindo(a) ao #geral!</h1>
                    <p class="text-[#B5BAC1]">Este é o começo do canal #geral no Danicord.</p>
                </div>
                <!-- As mensagens serão inseridas aqui via JS -->
            </div>

            <!-- Área de Input -->
            <div class="px-4 pb-6 pt-2">
                <div class="bg-[#383A40] rounded-lg flex flex-col">
                    <!-- Preview de anexo (escondido por padrão) -->
                    <div id="attachment-preview" class="hidden p-4 border-b border-[#2B2D31] flex items-center gap-4">
                        <div class="relative bg-[#2B2D31] p-2 rounded flex items-center gap-2">
                            <i class="fa-solid fa-file text-2xl text-[#B5BAC1]"></i>
                            <span id="attachment-name" class="text-sm truncate max-w-[200px]">arquivo.mp4</span>
                            <button onclick="removeAttachment()" class="absolute -top-2 -right-2 bg-red-500 rounded-full w-6 h-6 flex items-center justify-center text-white hover:bg-red-600 shadow">
                                <i class="fa-solid fa-xmark text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center px-4 py-2 min-h-[44px]">
                        <input type="file" id="file-input" class="hidden" onchange="handleFileSelect(event)">
                        <button onclick="document.getElementById('file-input').click()" class="text-[#B5BAC1] hover:text-[#DBDEE1] transition mr-4 bg-[#2B2D31] w-6 h-6 rounded-full flex items-center justify-center hover:bg-[#4E5058]">
                            <i class="fa-solid fa-plus text-sm"></i>
                        </button>
                        
                        <input type="text" id="message-input" placeholder="Conversar em #geral" class="flex-1 bg-transparent border-none outline-none text-[#DBDEE1] discord-input-placeholder py-1">
                        
                        <div class="flex gap-3 text-[#B5BAC1] ml-2">
                            <button class="hover:text-[#DBDEE1] transition"><i class="fa-solid fa-gift"></i></button>
                            <button class="hover:text-[#DBDEE1] transition"><i class="fa-solid fa-note-sticky"></i></button>
                            <button class="hover:text-[#DBDEE1] transition"><i class="fa-solid fa-face-smile"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Barra de Membros (Direita) -->
        <aside class="w-60 bg-[#2B2D31] flex-shrink-0 hidden md:flex flex-col pb-4">
            <div class="px-4 py-6 font-bold text-xs text-[#87898C] uppercase tracking-wide">
                Online — <span id="online-count">1</span>
            </div>
            <div id="members-list" class="flex-1 overflow-y-auto px-2 space-y-[2px]">
                <!-- Membros injetados via JS -->
            </div>
        </aside>

    </div>

    <!-- UI Modal Customizado (Substitui Alert) -->
    <div id="custom-alert" class="fixed inset-0 bg-black/50 items-center justify-center z-[100] flex backdrop-blur-sm">
        <div class="bg-[#313338] p-6 rounded-lg shadow-xl max-w-sm w-full text-center border border-[#1E1F22]">
            <h3 id="alert-title" class="text-xl font-bold text-white mb-2">Aviso</h3>
            <p id="alert-message" class="text-[#B5BAC1] mb-6">Mensagem</p>
            <button onclick="closeAlert()" class="bg-[#5865F2] hover:bg-[#4752C4] text-white px-6 py-2 rounded font-medium transition w-full">OK</button>
        </div>
    </div>

    <script>
        // Configurações e Estado
        let currentUser = null;
        let selectedFile = null;
        let isUploading = false;
        
        // Tenta conectar ao Socket. Se o arquivo estiver aberto localmente e não houver servidor, o socket.io pode não existir
        let socket = null;
        try {
            socket = io();
        } catch (e) {
            console.log("Socket.io não encontrado. O sistema precisa rodar através do server.js");
        }

        const defaultAvatar = 'https://cdn.discordapp.com/embed/avatars/1.png';

        // Elementos DOM
        const loginModal = document.getElementById('login-modal');
        const appContainer = document.getElementById('app-container');
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const fileInput = document.getElementById('file-input');
        const attachmentPreview = document.getElementById('attachment-preview');
        const attachmentName = document.getElementById('attachment-name');
        const membersList = document.getElementById('members-list');
        const onlineCount = document.getElementById('online-count');

        // Função de Alert Customizada
        function showAlert(title, message) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerText = message;
            document.getElementById('custom-alert').style.display = 'flex';
        }
        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        // Sistema de Login (Visual)
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const avatar = document.getElementById('avatar').value.trim() || defaultAvatar;
            // E-mail e senha são coletados na interface conforme solicitado, mas em um servidor simples não fazemos auth real no DB.
            
            currentUser = {
                name: username,
                avatar: avatar
            };

            // Atualiza UI
            document.getElementById('my-name-display').innerText = username;
            document.getElementById('my-avatar-display').src = avatar;

            // Animação de transição
            loginModal.classList.add('opacity-0');
            setTimeout(() => {
                loginModal.style.display = 'none';
                appContainer.classList.remove('hidden');
                
                // Conecta ao servidor e se anuncia
                if(socket) socket.emit('user joined', currentUser);
            }, 300);
        });

        // Formatação de Horário
        function formatTime(isoString) {
            const date = new Date(isoString);
            const today = new Date();
            const isToday = date.getDate() === today.getDate() && date.getMonth() === today.getMonth();
            
            const timeStr = date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return isToday ? `Hoje às ${timeStr}` : `${date.toLocaleDateString('pt-BR')} ${timeStr}`;
        }

        // Renderizar Mensagens
        function appendMessage(msg) {
            const isScrolledToBottom = chatMessages.scrollHeight - chatMessages.clientHeight <= chatMessages.scrollTop + 50;

            const div = document.createElement('div');
            
            if (msg.type === 'system') {
                div.className = 'flex items-center gap-2 text-[#87898C] text-sm hover:bg-[#2E3035] py-1 px-4 -mx-4 transition';
                div.innerHTML = `
                    <i class="fa-solid fa-arrow-right-to-bracket text-[#23A559] mr-2"></i>
                    <span class="font-bold text-[#DBDEE1]">${msg.text}</span>
                    <span class="text-xs ml-2">${formatTime(msg.timestamp)}</span>
                `;
            } else {
                div.className = 'flex gap-4 hover:bg-[#2E3035] py-1 px-4 -mx-4 transition group mt-4';
                
                // Construção da mídia (Vídeo, Imagem, Áudio)
                let mediaHtml = '';
                if (msg.mediaUrl) {
                    if (msg.mediaType === 'image') {
                        mediaHtml = `<img src="${msg.mediaUrl}" class="max-w-sm max-h-80 rounded-lg mt-2 cursor-pointer border border-[#1E1F22]">`;
                    } else if (msg.mediaType === 'video') {
                        mediaHtml = `<video src="${msg.mediaUrl}" controls class="max-w-md max-h-80 rounded-lg mt-2 border border-[#1E1F22] bg-black"></video>`;
                    } else if (msg.mediaType === 'audio') {
                        mediaHtml = `<audio src="${msg.mediaUrl}" controls class="mt-2 w-full max-w-sm"></audio>`;
                    } else {
                        mediaHtml = `
                        <div class="mt-2 bg-[#2B2D31] border border-[#1E1F22] p-3 rounded-lg flex items-center gap-3 max-w-sm">
                            <i class="fa-solid fa-file-lines text-3xl text-[#5865F2]"></i>
                            <a href="${msg.mediaUrl}" target="_blank" class="text-[#00A8FC] hover:underline truncate">Baixar Arquivo</a>
                        </div>`;
                    }
                }

                const textHtml = msg.text ? `<p class="text-[#DBDEE1] whitespace-pre-wrap leading-relaxed">${msg.text}</p>` : '';

                div.innerHTML = `
                    <img src="${msg.user.avatar}" class="w-10 h-10 rounded-full object-cover mt-0.5 cursor-pointer hover:opacity-80">
                    <div class="flex flex-col min-w-0 flex-1">
                        <div class="flex items-baseline gap-2">
                            <span class="font-medium text-white hover:underline cursor-pointer">${msg.user.name}</span>
                            <span class="text-xs text-[#87898C]">${formatTime(msg.timestamp)}</span>
                        </div>
                        ${textHtml}
                        ${mediaHtml}
                    </div>
                `;
            }

            chatMessages.appendChild(div);

            // Auto-scroll para baixo se o usuário já estava lá embaixo
            if (isScrolledToBottom || msg.user?.name === currentUser?.name) {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        // Lidar com Anexos
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                attachmentName.innerText = file.name;
                attachmentPreview.classList.remove('hidden');
                messageInput.focus();
            }
        }

        function removeAttachment() {
            selectedFile = null;
            fileInput.value = '';
            attachmentPreview.classList.add('hidden');
        }

        // Enviar Mensagem via Input e Socket
        async function sendMessage() {
            if (isUploading) return;
            const text = messageInput.value.trim();
            
            if (!text && !selectedFile) return;

            isUploading = true;
            messageInput.disabled = true;
            let mediaUrl = null;
            let mediaType = null;

            // Faz o Upload do arquivo para o servidor via fetch
            if (selectedFile) {
                const formData = new FormData();
                formData.append('media', selectedFile);

                try {
                    // Aqui a mágica de suporte a vídeos e arquivos grandes acontece. O servidor Multer processa.
                    messageInput.placeholder = "Enviando arquivo...";
                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.url) {
                        mediaUrl = data.url;
                        mediaType = data.type;
                    }
                } catch (error) {
                    console.error("Erro no upload", error);
                    showAlert("Erro de Upload", "Não foi possível enviar o arquivo. Verifique a conexão.");
                    isUploading = false;
                    messageInput.disabled = false;
                    messageInput.placeholder = "Conversar em #geral";
                    return;
                }
            }

            // Emite pelo socket
            if (socket) {
                socket.emit('chat message', {
                    user: currentUser,
                    text: text,
                    mediaUrl: mediaUrl,
                    mediaType: mediaType
                });
            }

            // Limpar formulário
            messageInput.value = '';
            removeAttachment();
            isUploading = false;
            messageInput.disabled = false;
            messageInput.placeholder = "Conversar em #geral";
            messageInput.focus();
        }

        // Detectar ENTER
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Configuração de Eventos do Socket
        if (socket) {
            socket.on('chat history', (history) => {
                history.forEach(msg => appendMessage(msg));
                setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 100);
            });

            socket.on('chat message', (msg) => {
                appendMessage(msg);
            });

            socket.on('update users', (users) => {
                onlineCount.innerText = users.length;
                membersList.innerHTML = '';
                
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center gap-3 p-1.5 rounded hover:bg-[#35373C] cursor-pointer group transition';
                    div.innerHTML = `
                        <div class="relative">
                            <img src="${u.avatar}" class="w-8 h-8 rounded-full object-cover">
                            <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-[#23A559] border-2 border-[#2B2D31] rounded-full"></div>
                        </div>
                        <span class="text-[#87898C] group-hover:text-[#DBDEE1] font-medium truncate flex-1 transition">${u.name}</span>
                    `;
                    membersList.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
